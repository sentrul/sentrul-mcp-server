name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci || npm install
      - run: npm run build
      - run: npm test
      - name: Smoke test stdio tools/list
        run: |
          OUTPUT=$(echo '{"jsonrpc":"2.0","id":1,"method":"tools/list"}' | node dist/index.js)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "sentrul_research"
          echo "$OUTPUT" | grep -q "sentrul_compliance_scan"
          echo "$OUTPUT" | grep -q "sentrul_trace_lookup"
